<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No Bullets Til They're Beautiful</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: black;

    /* allows scroll if needed */
    overflow: auto;
}

/* center wrapper BUT does NOT crop */
.wrapper {
    width: 100%;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* CRITICAL FIX:
   image scales to fit inside screen */
img {
    max-width: 100vw;   /* never exceed screen width */
    max-height: 100vh;  /* never exceed screen height */

    width: auto;
    height: auto;

    display: block;
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="images/band_website.png" alt="Artwork">
</div>

<!-- hidden SEO text -->
<div style="position:absolute;left:-9999px;">
    No Bullets Til They're Beautiful
    Cole Bosau
    Miles Bosau
</div>

</body>
</html>
