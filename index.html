<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>No Bullets Til They're Beautiful</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .seo-text {
            position: absolute;
            left: -9999px;
        }
    </style>
</head>

<body>

    <img src="images/band_website.png" alt="Background Image">

    <div class="seo-text">
        No Bullets Til They're Beautiful
        Cole Bosau
        Miles Bosau
    </div>

</body>
</html>
