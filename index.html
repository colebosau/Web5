<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No Bullets Til They're Beautiful</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: black;

    /* allow full movement */
    width: 100%;
    height: 100%;

    overflow: auto;
}

/* center the image block */
.wrapper {
    min-height: 100vh;
    min-width: 100vw;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* key: keeps full image, no crop */
img {
    height: auto;
    width: auto;

    /* ensures it scales nicely */
    max-height: none;
    max-width: none;

    display: block;
}

/* hidden SEO text */
.seo {
    position: absolute;
    left: -9999px;
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="images/band_website.png" alt="No Bullets Til They're Beautiful">
</div>

<div class="seo">
    No Bullets Til They're Beautiful
    Cole Bosau
    Miles Bosau
</div>

</body>
</html>
