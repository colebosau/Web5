<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>No Bullets Til They're Beautiful</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        /* FULLSCREEN IMAGE CONTAINER */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* IMAGE FIT CONTROL */
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills screen perfectly */
            object-position: center; /* keeps focus centered */
        }

        /* OPTIONAL: clean overlay (helps image look better) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.15); /* subtle dark layer */
            z-index: 0;
        }

        /* hidden SEO text */
        .seo {
            position: absolute;
            left: -9999px;
        }
    </style>
</head>

<body>

    <div class="bg">
        <img src="images/band_website.png" alt="No Bullets Til They're Beautiful">
    </div>

    <div class="overlay"></div>

    <div class="seo">
        No Bullets Til They're Beautiful
        Cole Bosau
        Miles Bosau
    </div>

</body>
</html>
