<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No Bullets Til They're Beautiful</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* FULL SCREEN DRAG VIEWER */
.viewer {
    width: 100vw;
    height: 100vh;
    overflow: auto;
    cursor: grab;
}

/* KEY FIX:
   guarantees FULL IMAGE always visible */
.viewer img {
    display: block;

    /* NO CROPPING EVER */
    max-width: 100vw;
    max-height: 100vh;

    width: auto;
    height: auto;

    margin: auto;
}

/* hidden SEO */
.seo {
    position: absolute;
    left: -9999px;
}
</style>
</head>

<body>

<div class="viewer" id="viewer">
    <img src="images/band_website.png" alt="Artwork">
</div>

<div class="seo">
    No Bullets Til They're Beautiful
    Cole Bosau
    Miles Bosau
</div>

<script>
const viewer = document.getElementById("viewer");

let isDown = false;
let startX, startY;
let scrollLeft, scrollTop;

viewer.addEventListener("mousedown", (e) => {
    isDown = true;
    viewer.style.cursor = "grabbing";

    startX = e.pageX;
    startY = e.pageY;

    scrollLeft = viewer.scrollLeft;
    scrollTop = viewer.scrollTop;
});

viewer.addEventListener("mouseup", () => {
    isDown = false;
    viewer.style.cursor = "grab";
});

viewer.addEventListener("mouseleave", () => {
    isDown = false;
});

viewer.addEventListener("mousemove", (e) => {
    if (!isDown) return;

    e.preventDefault();

    const x = e.pageX;
    const y = e.pageY;

    viewer.scrollLeft = scrollLeft - (x - startX);
    viewer.scrollTop = scrollTop - (y - startY);
});
</script>

</body>
</html>
