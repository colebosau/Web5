<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No Bullets Til They're Beautiful</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    background: black;

    /* allows left/right movement */
    overflow-x: auto;
    overflow-y: hidden;
}

/* image container */
.wrapper {
    height: 100vh;
    display: inline-block;
}

/* full image, no cropping */
img {
    height: 100vh;
    width: auto;
    display: block;
}

/* hidden SEO text */
.seo {
    position: absolute;
    left: -9999px;
    top: auto;
    width: 1px;
    height: 1px;
    overflow: hidden;
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="images/band_website.png" alt="No Bullets Til They're Beautiful artwork">
</div>

<!-- hidden names for SEO -->
<div class="seo">
    No Bullets Til They're Beautiful
    Cole Bosau
    Miles Bosau
</div>

</body>
</html>
