<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No Bullets Til They're Beautiful</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* VIEWPORT */
.viewer {
    width: 100vw;
    height: 100vh;
    overflow: auto;
    cursor: grab;
}

/* IMAGE (FIXED) */
.viewer img {
    display: block;

    /* KEY FIX:
       ensures FULL IMAGE is always visible */
    max-width: none;
    max-height: none;

    width: auto;
    height: auto;
}

/* HIDDEN SEO TEXT */
.seo {
    position: absolute;
    left: -9999px;
    top: auto;
    width: 1px;
    height: 1px;
    overflow: hidden;
}
</style>
</head>

<body>

<div class="viewer" id="viewer">
    <img src="images/band_website.png" alt="No Bullets Til They're Beautiful artwork">
</div>

<!-- hidden SEO names -->
<div class="seo">
    No Bullets Til They're Beautiful
    Cole Bosau
    Miles Bosau
</div>

<script>
const viewer = document.getElementById("viewer");

let isDown = false;
let startX, startY;
let scrollLeft, scrollTop;

viewer.addEventListener("mousedown", (e) => {
    isDown = true;
    viewer.style.cursor = "grabbing";

    startX = e.pageX;
    startY = e.pageY;

    scrollLeft = viewer.scrollLeft;
    scrollTop = viewer.scrollTop;
});

viewer.addEventListener("mouseup", () => {
    isDown = false;
    viewer.style.cursor = "grab";
});

viewer.addEventListener("mouseleave", () => {
    isDown = false;
});

viewer.addEventListener("mousemove", (e) => {
    if (!isDown) return;

    e.preventDefault();

    const x = e.pageX;
    const y = e.pageY;

    const walkX = x - startX;
    const walkY = y - startY;

    viewer.scrollLeft = scrollLeft - walkX;
    viewer.scrollTop = scrollTop - walkY;
});
</script>

</body>
</html>
